<svg xmlns="http://www.w3.org/2000/svg" width="720" height="328" viewBox="0 0 720 328">
<defs>
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="scan" x="0" y="0" width="720" height="3" patternUnits="userSpaceOnUse">
    <rect width="720" height="1.2" y="1.6" fill="rgba(0,0,0,0.15)"/>
  </pattern>
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.50)"/>
  </radialGradient>
  <linearGradient id="titlebar" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#1a003a"/>
    <stop offset="50%"  stop-color="#2a0050"/>
    <stop offset="100%" stop-color="#1a003a"/>
  </linearGradient>
</defs>
<style>
  .mono { font-family: "Courier New", Courier, monospace; font-size: 13px; }
  @keyframes l0 {0%,2.5%{opacity:0}3.83%,80%{opacity:1}93%,100%{opacity:0}}
  @keyframes l1 {0%,7.92%{opacity:0}9.25%,80%{opacity:1}93%,100%{opacity:0}}
  @keyframes l2 {0%,13.33%{opacity:0}14.67%,80%{opacity:1}93%,100%{opacity:0}}
  @keyframes l3 {0%,18.75%{opacity:0}20.08%,80%{opacity:1}93%,100%{opacity:0}}
  @keyframes l4 {0%,24.17%{opacity:0}25.5%,80%{opacity:1}93%,100%{opacity:0}}
  @keyframes l5 {0%,29.58%{opacity:0}30.92%,80%{opacity:1}93%,100%{opacity:0}}
  @keyframes l6 {0%,35%{opacity:0}36.33%,80%{opacity:1}93%,100%{opacity:0}}
  @keyframes l7 {0%,40.42%{opacity:0}41.75%,80%{opacity:1}93%,100%{opacity:0}}
  @keyframes l8 {0%,45.83%{opacity:0}47.17%,80%{opacity:1}93%,100%{opacity:0}}
  @keyframes l9 {0%,51.25%{opacity:0}52.58%,80%{opacity:1}93%,100%{opacity:0}}
  @keyframes l10{0%,56.67%{opacity:0}58%,80%{opacity:1}93%,100%{opacity:0}}
  @keyframes l11{0%,62.08%{opacity:0}63.42%,80%{opacity:1}93%,100%{opacity:0}}
  @keyframes l12{0%,67.5%{opacity:0}68.83%,80%{opacity:1}93%,100%{opacity:0}}
  @keyframes l13{0%,72.92%{opacity:0}74.25%,80%{opacity:1}93%,100%{opacity:0}}
  @keyframes cur{0%,49%{opacity:1}50%,100%{opacity:0}}
  @keyframes borderPulse{0%,100%{stroke-opacity:0.55}50%{stroke-opacity:1}}
  @keyframes titleGlow{0%,100%{opacity:0.8}50%{opacity:1}}
</style>
<!-- shadow -->
<rect x="4" y="6" width="720" height="328" rx="13" fill="rgba(255,121,198,0.10)"/>
<!-- window bg -->
<rect width="720" height="328" rx="12" fill="#06000d"/>
<!-- border pulse -->
<rect width="720" height="328" rx="12" fill="none" stroke="#ff79c6" stroke-width="1.8"
  style="animation:borderPulse 3s ease-in-out infinite"/>
<!-- title bar -->
<rect width="720" height="34" rx="12" fill="url(#titlebar)"/>
<rect y="24" width="720" height="10" fill="#2a0050"/>
<!-- traffic lights -->
<circle cx="20" cy="17" r="6" fill="#ff5f57"/>
<circle cx="20" cy="17" r="5" fill="none" stroke="#c0392b" stroke-width="0.8" opacity="0.6"/>
<circle cx="42" cy="17" r="6" fill="#febc2e"/>
<circle cx="42" cy="17" r="5" fill="none" stroke="#d4a017" stroke-width="0.8" opacity="0.6"/>
<circle cx="64" cy="17" r="6" fill="#28c841"/>
<circle cx="64" cy="17" r="5" fill="none" stroke="#1d8e2e" stroke-width="0.8" opacity="0.6"/>
<!-- title -->
<text x="360" y="22" fill="#ff79c6" font-family="Courier New,monospace" font-size="12"
  font-weight="bold" text-anchor="middle" filter="url(#glow)"
  style="animation:titleGlow 2s ease-in-out infinite">run_27.py — python3</text>
<!-- separator -->
<line x1="0" y1="34" x2="720" y2="34" stroke="#ff79c6" stroke-width="1" opacity="0.5"
  filter="url(#glow)"/>

<!-- l0: prompt + command -->
<text class="mono" opacity="0" y="56" filter="url(#glow)" style="animation:l0 12s linear infinite">
  <tspan x="16" fill="#bd93f9">goot</tspan><tspan fill="#ff79c6">@</tspan><tspan fill="#ff4d9e">27</tspan><tspan fill="#bd93f9">:~$&#160;</tspan><tspan fill="#f8f8f2">python3 run_27.py</tspan>
</text>

<!-- l1: noise burst -->
<text class="mono" opacity="0" y="74" filter="url(#glow)" style="animation:l1 12s linear infinite">
  <tspan x="16" fill="#ff79c6">27 27 27 27 27 27 27 27 27 27 27 27 27 27 27 27 27 27 27 27 27 27 27 27 27 27</tspan>
</text>

<!-- l2: noise burst -->
<text class="mono" opacity="0" y="92" filter="url(#glow)" style="animation:l2 12s linear infinite">
  <tspan x="16" fill="#ff4d9e">272727272727272727272727272727272727272727272727272727272727272727272727272727</tspan>
</text>

<!-- l3: noise burst -->
<text class="mono" opacity="0" y="110" filter="url(#glow)" style="animation:l3 12s linear infinite">
  <tspan x="16" fill="#e040fb">27 272727 2727 272727272727 27272727 272727272727 2727272727 272727272727272727</tspan>
</text>

<!-- l4: logo row 0 -->
<text class="mono" opacity="0" y="128" filter="url(#glow2)" style="animation:l4 12s linear infinite">
  <tspan x="16" fill="#ff79c6">&#x2554;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2557;  &#x2554;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2557;  &#x2554;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2557;  &#x2550;&#x2550;&#x2550;&#x2566;&#x2550;&#x2550;&#x2550;  &#x2554;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2557;  &#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2557;</tspan>
</text>

<!-- l5: logo row 1 -->
<text class="mono" opacity="0" y="146" filter="url(#glow2)" style="animation:l5 12s linear infinite">
  <tspan x="16" fill="#ff79c6">&#x2551;     &#x2551;  &#x2551;     &#x2551;  &#x2551;     &#x2551;     &#x2551;           &#x2551;        &#x2551;</tspan>
</text>

<!-- l6: logo row 2 -->
<text class="mono" opacity="0" y="164" filter="url(#glow2)" style="animation:l6 12s linear infinite">
  <tspan x="16" fill="#ff6ec7">&#x2551;        &#x2551;     &#x2551;  &#x2551;     &#x2551;     &#x2551;     &#x2554;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x255D;     &#x2554;&#x2550;&#x2550;&#x255D;</tspan>
</text>

<!-- l7: logo row 3 -->
<text class="mono" opacity="0" y="182" filter="url(#glow2)" style="animation:l7 12s linear infinite">
  <tspan x="16" fill="#ff6ec7">&#x2551; &#x2550;&#x2550;&#x2550;&#x2550;&#x2563;  &#x2551;     &#x2551;  &#x2551;     &#x2551;     &#x2551;     &#x2551;           &#x2551;   </tspan>
</text>

<!-- l8: logo row 4 -->
<text class="mono" opacity="0" y="200" filter="url(#glow2)" style="animation:l8 12s linear infinite">
  <tspan x="16" fill="#ff79c6">&#x2551;     &#x2551;  &#x2551;     &#x2551;  &#x2551;     &#x2551;     &#x2551;     &#x2551;           &#x2551;   </tspan>
</text>

<!-- l9: logo row 5 -->
<text class="mono" opacity="0" y="218" filter="url(#glow2)" style="animation:l9 12s linear infinite">
  <tspan x="16" fill="#ff4d9e">&#x255A;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x255D;  &#x255A;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x255D;  &#x255A;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x255D;     &#x2569;     &#x255A;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;     &#x2569;   </tspan>
</text>

<!-- l10: noise after logo -->
<text class="mono" opacity="0" y="236" filter="url(#glow)" style="animation:l10 12s linear infinite">
  <tspan x="16" fill="#bd93f9">2727272727 272727 27272727272727 2727272727 272727272727 27272727</tspan>
</text>

<!-- l11: ^C interrupt -->
<text class="mono" opacity="0" y="254" filter="url(#glow)" style="animation:l11 12s linear infinite">
  <tspan x="16" fill="#f8f8f2">^C</tspan>
</text>

<!-- l12: KeyboardInterrupt -->
<text class="mono" opacity="0" y="272" filter="url(#glow)" style="animation:l12 12s linear infinite">
  <tspan x="16" fill="#ff2d78">KeyboardInterrupt</tspan>
</text>

<!-- l13: return prompt -->
<text class="mono" opacity="0" y="290" filter="url(#glow)" style="animation:l13 12s linear infinite">
  <tspan x="16" fill="#bd93f9">goot</tspan><tspan fill="#ff79c6">@</tspan><tspan fill="#ff4d9e">27</tspan><tspan fill="#bd93f9">:~$&#160;</tspan>
</text>

<!-- blinking cursor -->
<text class="mono" y="290" fill="#ff79c6" opacity="0" filter="url(#glow)"
  style="animation:l13 12s linear infinite, cur 0.85s 8.75s ease-in-out infinite">
  <tspan x="101.8">&#x258c;</tspan>
</text>

<!-- scanlines -->
<rect x="0" y="34" width="720" height="294" fill="url(#scan)"/>
<!-- vignette -->
<rect width="720" height="328" rx="12" fill="url(#vignette)"/>
</svg>
